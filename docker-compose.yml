services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: qpg
      POSTGRES_USER: qpg
      POSTGRES_PASSWORD: qpg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qpg"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      RUN_MIGRATIONS: "1"
      DJANGO_DEBUG: "1"
      POSTGRES_HOST: db
      POSTGRES_DB: qpg
      POSTGRES_USER: qpg
      POSTGRES_PASSWORD: qpg
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    environment:
      DJANGO_DEBUG: "1"
      POSTGRES_HOST: db
      POSTGRES_DB: qpg
      POSTGRES_USER: qpg
      POSTGRES_PASSWORD: qpg
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_PROXY: http://web:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - web

volumes:
  pgdata:
