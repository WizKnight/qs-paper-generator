services:
  db:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    environment:
      POSTGRES_DB: qpg
      POSTGRES_USER: qpg
      POSTGRES_PASSWORD: qpg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qpg"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      RUN_MIGRATIONS: "1"
      DJANGO_DEBUG: "1"
      POSTGRES_HOST: db
      POSTGRES_DB: qpg
      POSTGRES_USER: qpg
      POSTGRES_PASSWORD: qpg
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
    volumes:
      - ./backend:/app
      - ./content:/content
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_PROXY: http://web:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - web

volumes:
  pgdata:
